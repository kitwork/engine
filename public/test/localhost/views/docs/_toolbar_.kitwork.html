<div class="lg:col-span-3 order-3">
    <div class="sticky top-32">
        <h3 class="font-black text-[10px] text-gray-400 uppercase tracking-[0.2em] mb-4">On this page</h3>
        <nav id="toc-nav">
            <ul id="dynamic-toc" class="space-y-4 border-l border-gray-200 dark:border-gray-800 relative">
                <!-- Mục lục tự động -->
            </ul>
        </nav>

        <div class="mt-12 p-6 bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-gray-200 dark:border-gray-700">
            <h4 class="font-bold text-sm text-gray-900 dark:text-white mb-2">Need help?</h4>
            <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed mb-4">Can't find what you're looking for?
                Join our Discord community.</p>
            <a href="#"
                class="text-xs font-black text-brand uppercase tracking-widest hover:underline transition-all">Join
                Discord &rarr;</a>
        </div>
    </div>
</div>

<script>
    (function() {
        let isManualScrolling = false;

        function updateActiveLink(id) {
            const links = document.querySelectorAll('.toc-link');
            links.forEach(link => {
                const isActive = link.getAttribute('href') === '#' + id;
                const parent = link.parentElement;
                if (isActive) {
                    link.classList.add('text-brand', 'font-bold');
                    parent.classList.add('border-l-2', 'border-brand', '-ml-[2px]');
                } else {
                    link.classList.remove('text-brand', 'font-bold');
                    parent.classList.remove('border-l-2', 'border-brand', '-ml-[2px]');
                }
            });
        }

        function initTOC() {
            const tocContainer = document.getElementById('dynamic-toc');
            const contentArea = document.querySelector('.lg\\:col-span-6');

            if (!tocContainer || !contentArea) return;

            tocContainer.innerHTML = '';
            
            const headings = Array.from(contentArea.querySelectorAll('h2, h3')).filter(h => {
                return !h.closest('.lg\\:order-1') && !h.closest('.order-3');
            });

            if (headings.length === 0) {
                document.querySelector('.order-3').style.opacity = '0.3';
                return;
            }

            headings.forEach((heading, index) => {
                if (!heading.id) heading.id = 'section-' + index;
                const li = document.createElement('li');
                li.className = heading.tagName.toLowerCase() === 'h3' ? 'pl-8' : 'pl-4';
                
                const a = document.createElement('a');
                a.href = '#' + heading.id;
                a.className = 'toc-link block text-gray-500 dark:text-gray-400 hover:text-brand text-xs font-medium transition-all';
                a.textContent = heading.textContent.trim();
                
                // Click handler
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    isManualScrolling = true; // Tạm dừng observer khi click
                    
                    const target = document.getElementById(heading.id);
                    if (target) {
                        const top = target.getBoundingClientRect().top + window.pageYOffset - 120;
                        window.scrollTo({ top, behavior: 'smooth' });
                        
                        updateActiveLink(heading.id);
                        history.pushState(null, null, '#' + heading.id);
                        
                        // Kích hoạt lại observer sau khi cuộn xong
                        setTimeout(() => { isManualScrolling = false; }, 800);
                    }
                });

                li.appendChild(a);
                tocContainer.appendChild(li);
            });

            // Scroll Spy
            const observer = new IntersectionObserver((entries) => {
                if (isManualScrolling) return; // Không chạy khi đang click cuộn

                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        updateActiveLink(entry.target.id);
                    }
                });
            }, { rootMargin: '-100px 0px -70% 0px' });

            headings.forEach(h => observer.observe(h));
        }

        // Chạy khởi tạo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTOC);
        } else {
            initTOC();
        }
        
        // Chạy lại sau 1s để chắc chắn nội dung đã ổn định
        setTimeout(initTOC, 1000);
    })();
</script>
