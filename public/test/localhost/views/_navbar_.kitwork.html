<script>
    const nav = document.getElementById('main-nav');
    const toggleBtn = document.getElementById('dark-mode-toggle');

    // Scroll effect
    window.addEventListener('scroll', function () {
        if (window.scrollY > 10) {
            nav.classList.add('bg-white/80', 'dark:bg-[#1a1b26]/80', 'backdrop-blur-md', 'border-gray-200', 'dark:border-gray-800', 'py-3', 'shadow-sm');
            nav.classList.remove('py-5', 'border-transparent');
        } else {
            nav.classList.remove('bg-white/80', 'dark:bg-[#1a1b26]/80', 'backdrop-blur-md', 'border-gray-200', 'dark:border-gray-800', 'py-3', 'shadow-sm');
            nav.classList.add('py-5', 'border-transparent');
        }
    });

    // Dark Mode Logic (Simplified: Moon Icon Only)
    toggleBtn.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Initial state check
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
</script>
