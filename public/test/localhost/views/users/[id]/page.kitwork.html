<div class="max-w-4xl mx-auto p-6 md:p-12 min-h-[80vh] flex flex-col items-center justify-center relative">
    <!-- Ambient background -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-brand/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full relative z-10">
        <!-- Back Action -->
        <div class="mb-12 flex justify-center">
            <a href="/users"
                class="inline-flex items-center gap-3 px-6 py-3 bg-white dark:bg-gray-800 text-gray-900 dark:text-white rounded-2xl font-bold text-xs tracking-widest uppercase border border-gray-200 dark:border-gray-700 hover:border-brand dark:hover:border-brand hover:text-brand transition-all duration-300 hover:-translate-x-1 shadow-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Registry
            </a>
        </div>

        {{ if user }}
        <div class="max-w-md mx-auto bg-white dark:bg-[#0f172a]/40 border border-gray-200 dark:border-gray-800 rounded-[2.5rem] p-10 md:p-16 shadow-2xl shadow-gray-200/50 dark:shadow-black/50 backdrop-blur-xl relative overflow-hidden group">
            <!-- Decorative corner -->
            <div class="absolute -top-12 -right-12 w-24 h-24 bg-brand/10 rounded-full blur-2xl group-hover:bg-brand/20 transition-all duration-500"></div>
            
            <div class="relative z-10">
                <!-- User Avatar/Initial -->
                <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-brand-light to-brand flex items-center justify-center text-4xl font-black text-white mx-auto mb-10 shadow-xl shadow-brand/20 rotate-3 group-hover:rotate-0 transition-transform duration-500">
                    {{ user.username[0] | upper }}
                </div>

                <!-- User Info -->
                <div class="text-center space-y-8">
                    <div>
                        <span class="inline-block px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-full text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Identity</span>
                        <h2 class="text-3xl font-black text-gray-900 dark:text-white tracking-tighter">{{ user.username }}</h2>
                    </div>

                    <div>
                        <span class="inline-block px-3 py-1 bg-gray-100 dark:bg-gray-800 rounded-full text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Communication</span>
                        <p class="text-lg text-gray-600 dark:text-gray-400 font-medium">{{ user.email }}</p>
                    </div>

                    <div class="pt-10 border-t border-gray-100 dark:border-gray-800 flex justify-between items-center">
                        <div class="text-left">
                            <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">System ID</span>
                            <span class="font-mono text-sm text-brand font-bold">#00{{ user.id }}</span>
                        </div>
                        <div class="text-right">
                            <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Status</span>
                            <span class="inline-flex items-center gap-1.5 text-xs font-bold text-emerald-500">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                Active
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {{ else }}
        <!-- Not Found State -->
        <div class="max-w-md mx-auto text-center py-20 bg-gray-50 dark:bg-gray-800/20 rounded-[2.5rem] border border-dashed border-gray-300 dark:border-gray-700">
            <div class="text-6xl mb-6 grayscale opacity-50">👤</div>
            <h3 class="text-2xl font-black text-gray-900 dark:text-white mb-2">Subject Missing</h3>
            <p class="text-gray-500 dark:text-gray-400">This identity has been purged or never existed.</p>
        </div>
        {{ end }}
    </div>
</div>
