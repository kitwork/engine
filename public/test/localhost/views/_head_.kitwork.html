<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title ?? "Kitwork Sovereign Logic Engine" }}</title>
    <meta name="description" content="Kitwork Engine is an industrial-grade logic infrastructure.">
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Prevent FOUC -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Tailwind CSS -->
    <script src="/taiwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#f82244',
                            light: '#ff758f',
                            accent: '#f7768e',
                        },
                        tokyo: {
                            bg: '#fcfcfd',
                            panel: '#ffffff',
                            border: '#f1f3f5',
                            text: '#242442',
                            muted: '#6e7687'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fcfcfd;
            transition: background-color 0.3s ease;
        }

        .dark body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(248, 34, 68, 0.15) 0%, transparent 60%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        .dark body::before {
            background: radial-gradient(circle, rgba(248, 34, 68, 0.2) 0%, transparent 70%);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f9fafb;
            border-left: 1px solid #f3f4f6;
        }

        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
            border-left: 1px solid #334155;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border: 2px solid #f9fafb;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
            border: 2px solid #1e293b;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f82244;
        }

        /* Premium Table Styles */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 3rem 0;
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        .dark table {
            border-color: #1e293b;
            background-color: #1e293b66;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        table th {
            background-color: #f8fafc;
            color: #0f172a;
            font-weight: 800;
            text-align: left;
            padding: 1.25rem 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.725rem;
            border-bottom: 2px solid #f1f3f5;
            position: relative;
        }

        .dark table th {
            background-color: #1e293b;
            color: #f1f5f9;
            border-bottom-color: #334155;
        }

        /* Subtle brand accent on header */
        table th::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 1.5rem;
            width: 30px;
            height: 2px;
            background-color: #f82244;
        }

        table th.text-right::after {
            left: auto;
            right: 1.5rem;
        }

        table td {
            padding: 1.15rem 1.5rem;
            color: #475569;
            border-bottom: 1px solid #f1f3f5;
            line-height: 1.7;
            vertical-align: top;
            transition: all 0.2s ease;
        }

        .dark table td {
            color: #94a3b8;
            border-bottom-color: #334155;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        table tr:hover td {
            background-color: #f8fafc;
            color: #0f172a;
            transform: translateX(2px);
        }

        .dark table tr:hover td {
            background-color: #33415540;
            color: #ffffff;
        }

        /* Code inside tables - Industrial Style */
        table code {
            background-color: #f1f5f9;
            color: #f82244;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.825rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }

        .dark table code {
            background-color: #0f172a;
            color: #ff758f;
            border-color: #334155;
        }

        /* Global Docs Typography & Spacing - Isolated to .docs-content */
        * {
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4 {
            scroll-margin-top: 120px;
        }

        .docs-content h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2.5rem;
            letter-spacing: -0.05em;
            color: #0f172a;
        }

        .dark .docs-content h1 {
            color: #ffffff;
        }

        .docs-content h2 {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1.2;
            margin-top: 5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .dark .docs-content h2 {
            color: #f1f5f9;
        }

        .docs-content h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 3rem;
            margin-bottom: 1rem;
            color: #334155;
        }

        .dark .docs-content h3 {
            color: #cbd5e1;
        }

        .docs-content p {
            font-size: 1.125rem;
            line-height: 1.8;
            margin-bottom: 1.75rem;
            color: #475569;
            font-weight: 450;
        }

        .dark .docs-content p {
            color: #94a3b8;
        }

        .docs-content ul, .docs-content ol {
            margin-bottom: 2rem;
            padding-left: 1.5rem;
        }

        .docs-content li {
            margin-bottom: 0.75rem;
            color: #64748b;
            line-height: 1.6;
        }

        .dark .docs-content li {
            color: #94a3b8;
        }

        .docs-content hr {
            margin: 4rem 0;
            border: 0;
            border-top: 1px solid #e2e8f0;
        }

        .dark .docs-content hr {
            border-top-color: #1e293b;
        }

        /* Blockquotes */
        .docs-content blockquote {
            border-left: 4px solid #f82244;
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            background-color: #f8fafc;
            border-radius: 0 1rem 1rem 0;
            font-style: italic;
        }

        .dark .docs-content blockquote {
            background-color: #1e293b40;
            color: #cbd5e1;
        }
    </style>
</head>
