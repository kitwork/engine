<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title ?? "Kitwork Sovereign Logic Engine" }}</title>
    <meta name="description" content="Kitwork Engine is an industrial-grade logic infrastructure.">
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Prevent FOUC -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Tailwind CSS -->
    <script src="/taiwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#f82244',
                            light: '#ff758f',
                            accent: '#f7768e',
                        },
                        tokyo: {
                            bg: '#fcfcfd',
                            panel: '#ffffff',
                            border: '#f1f3f5',
                            text: '#242442',
                            muted: '#6e7687'
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fcfcfd;
            transition: background-color 0.3s ease;
        }

        .dark body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(248, 34, 68, 0.15) 0%, transparent 60%);
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
        }

        .dark body::before {
            background: radial-gradient(circle, rgba(248, 34, 68, 0.2) 0%, transparent 70%);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f9fafb;
            border-left: 1px solid #f3f4f6;
        }

        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
            border-left: 1px solid #334155;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border: 2px solid #f9fafb;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
            border: 2px solid #1e293b;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f82244;
        }
    </style>
</head>
